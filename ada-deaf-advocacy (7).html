<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advocate for Deaf ADA Rights</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0a1628;
  --navy-mid:#1a2d4a;
  --gold:#e8c547;
  --cream:#f5f0e8;
  --muted:#8a9bb5;
  --radius:12px;
}

body {
  margin:0;
  font-family:"DM Sans",sans-serif;
  background:var(--navy);
  color:var(--cream);
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.hero {
  text-align:center;
  padding:60px 20px 30px;
}

.hero h1 {
  font-family:"DM Serif Display",serif;
  color:white;
  font-size:42px;
}

.hero p {
  color:var(--muted);
  max-width:600px;
  margin:auto;
}

.section-title {
  font-size:22px;
  margin:30px 0 10px;
  color:var(--gold);
}

input,select {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:var(--gold);
  color:var(--navy);
  width:100%;
}

.secondary {
  background:#243b5e;
  color:white;
  width:100%;
}

pre {
  background:#111;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
}

.contact {
  display:block;
  background:#243b5e;
  padding:10px;
  margin:6px 0;
  text-align:center;
  border-radius:8px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Strengthen ADA Communication Rights</h1>
  <p>Send a pre-written advocacy email to key officials in under 5 minutes.</p>
</div>

<div class="container">

<div class="section-title">Your Info</div>

<input id="name" placeholder="Your name" oninput="updateEmail()">
<input id="city" placeholder="City, State" oninput="updateEmail()">

<select id="role" onchange="updateEmail()">
  <option>Concerned citizen</option>
  <option>Deaf individual</option>
  <option>Student</option>
  <option>Professional</option>
</select>

<div class="section-title">Email Preview</div>

<pre id="emailBox"></pre>

<button class="primary" onclick="copyEmail()">Copy Email</button>

<div class="section-title">Contacts</div>

<a class="contact" href="https://www.lee.senate.gov/contact" target="_blank">Mike Lee</a>
<a class="contact" href="https://www.curtis.senate.gov/contact" target="_blank">John Curtis</a>
<a class="contact" href="https://blakemoore.house.gov/contact" target="_blank">Blake Moore</a>
<a class="contact" href="https://maloy.house.gov/contact" target="_blank">Celeste Maloy</a>
<a class="contact" href="https://owens.house.gov/contact" target="_blank">Burgess Owens</a>

<button class="primary" onclick="sendToAll()">Send to All Contacts</button>
<button class="secondary" onclick="copyLink()">Copy Share Link</button>

</div>

<script>

const contacts = [
  "https://www.lee.senate.gov/contact",
  "https://www.curtis.senate.gov/contact",
  "https://blakemoore.house.gov/contact",
  "https://maloy.house.gov/contact",
  "https://owens.house.gov/contact"
];

function emailTemplate(name, role, city) {
  const n = name || "[Your Name]";
  const r = role || "concerned citizen";
  const c = city || "[City, State]";

  return `Dear Representative,

My name is ${n}, a ${r} from ${c}. I am writing to urge stronger ADA communication protections for Deaf individuals.

The current “effective communication” standard is too vague and leads to inconsistent access.

I respectfully request clearer enforcement, mandatory accessibility standards, and stronger accountability.

Sincerely,
${n}
${c}`;
}

function updateEmail() {
  const name = document.getElementById("name").value;
  const city = document.getElementById("city").value;
  const role = document.getElementById("role").value;

  document.getElementById("emailBox").textContent =
    emailTemplate(name, role, city);
}

function copyEmail() {
  navigator.clipboard.writeText(
    document.getElementById("emailBox").textContent
  );
  alert("Email copied!");
}

/* FIXED SEND ALL */
function sendToAll() {
  if (!confirm("Open all contact pages to paste your email?")) return;

  contacts.forEach((url, i) => {
    setTimeout(() => window.open(url, "_blank"), i * 400);
  });
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
}

updateEmail();

</script>

</body>
</html>
